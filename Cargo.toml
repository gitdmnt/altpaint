[workspace]
members = [
  "crates/app-core",
  "crates/builtin-plugins",
  "crates/render",
  "crates/storage",
  "crates/ui-shell",
  "crates/plugin-api",
  "apps/desktop",
]
resolver = "2"

[workspace.package]
edition = "2024"
license = "MIT"
version = "0.1.0"
authors = ["Naoto"]

[workspace.dependencies]
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
thiserror = "2.0"
winit = "0.30"
pixels = "0.15"
wgpu = "28.0"
pollster = "0.4"
slint = { version = "1.15.1", default-features = true, features = [
  "backend-winit",
  "renderer-femtovg",
  "renderer-femtovg-wgpu",
  "unstable-wgpu-28",
] }
slint-build = "1.15.1"
