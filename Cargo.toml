[workspace]
members = [
  "crates/app-core",
  "crates/builtin-plugins",
  "crates/render",
  "crates/storage",
  "crates/ui-shell",
  "crates/plugin-api",
  "apps/desktop",
]
resolver = "2"

[workspace.package]
edition = "2024"
license = "MIT"
version = "0.1.0"
authors = ["Naoto"]

[workspace.dependencies]
anyhow = "1.0"
font8x8 = "0.3"
serde = { version = "1.0", features = ["derive"] }
thiserror = "2.0"
winit = "0.30"
pixels = "0.15"
wgpu = "28.0"
pollster = "0.4"
