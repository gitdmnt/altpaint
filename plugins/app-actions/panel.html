<div class="panel">
  <header class="panel-title">ファイル</header>
  <section class="group">
    <h3 class="group-title">編集</h3>
    <div class="row">
      <button class="btn" id="app.undo" data-action="service:history.undo"
              data-bind-disabled="!host.can_undo">↩ 元に戻す</button>
      <button class="btn" id="app.redo" data-action="service:history.redo"
              data-bind-disabled="!host.can_redo">↪ やり直し</button>
    </div>
  </section>
  <section class="group">
    <h3 class="group-title">プロジェクト</h3>
    <button class="btn" id="app.save"    data-action="service:project_io.save_current">💾 上書き保存</button>
    <button class="btn" id="app.save_as" data-action="service:project_io.save_as">📁 別名で保存</button>
    <button class="btn" id="app.load"    data-action="service:project_io.load_dialog">📂 開く...</button>
  </section>
  <section class="group">
    <h3 class="group-title">ジョブ</h3>
    <p>アクティブ: <span class="badge" id="job-count" data-bind-text="jobs.active">0</span></p>
  </section>
</div>
